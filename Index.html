<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>ברוך הבא</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  color: white;
  text-align: center;
  background: black;
}

/* רקע חלל */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 50px 50px;
  animation: move 60s linear infinite;
  z-index: 0;
}

@keyframes move {
  from {transform: translateY(0);}
  to {transform: translateY(-1000px);}
}

.box {
  position: relative;
  z-index: 2;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.08);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
  animation: fade 1.5s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(-60%);}
  to {opacity: 1; transform: translateY(-50%);}
}

h1 {
  margin-bottom: 20px;
  text-shadow: 0 0 10px white;
}

button {
  display: block;
  width: 250px;
  margin: 10px auto;
  padding: 15px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  transition: 0.2s;
}

.enter {
  background: linear-gradient(45deg, #00ff99, #00ccff);
}

.back {
  background: linear-gradient(45deg, #ff4d4d, #ff9900);
}

.music {
  background: linear-gradient(45deg, #9b59b6, #3498db);
}

button:hover {
  transform: scale(1.07);
  box-shadow: 0 0 15px white;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="box">
  <h1>היי, ברוך הבא!</h1>

  <button class="enter" onclick="enterSite()">להיכנס לאתר 🖕</button>
  <button class="back" onclick="goBack()">לחזור אחורה 🏳️‍🌈</button>
  <button class="music" onclick="playMusic()">▶ הפעל מוזיקה</button>
</div>

<!-- מוזיקה -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<!-- סאונד קליק -->
<audio id="click">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>
function clickSound(){
  document.getElementById("click").play();
}

function enterSite(){
  clickSound();
  alert("ברוך הבא 🚀");
}

function goBack(){
  clickSound();
  history.back();
}

function playMusic(){
  document.getElementById("music").play();
}
</script>

</body>
</html>
