<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>ברוך הבא</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  color: white;
  text-align: center;
  background: black;
}

/* רקע חלל */
.stars, .stars2, .stars3 {
  position: absolute;
  width: 100%;
  height: 100%;
  background-repeat: repeat;
  z-index: 0;
}

.stars {
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 50px 50px;
  animation: moveStars 60s linear infinite;
}

.stars2 {
  background-image: radial-gradient(#aaa 1px, transparent 1px);
  background-size: 80px 80px;
  animation: moveStars 120s linear infinite;
  opacity: 0.6;
}

.stars3 {
  background-image: radial-gradient(#555 1px, transparent 1px);
  background-size: 120px 120px;
  animation: moveStars 200s linear infinite;
  opacity: 0.4;
}

@keyframes moveStars {
  from {transform: translateY(0);}
  to {transform: translateY(-1000px);}
}

/* קופסה */
.box {
  position: relative;
  z-index: 2;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.08);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-60%);}
  to {opacity: 1; transform: translateY(-50%);}
}

h1 {
  margin-bottom: 25px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 10px white;}
  to {text-shadow: 0 0 25px #00f2ff;}
}

/* כפתורים */
button {
  display: block;
  width: 260px;
  padding: 15px;
  margin: 12px auto;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  transition: 0.3s;
}

.enter {
  background: linear-gradient(45deg, #00ff99, #00ccff);
}

.back {
  background: linear-gradient(45deg, #ff4d4d, #ff9900);
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px white;
}

</style>
</head>

<body>

<!-- כוכבים -->
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<div class="box">
  <h1>היי, ברוך הבא!</h1>

  <button class="enter" onclick="enterSite()">
    להיכנס לאתר 🖕
  </button>

  <button class="back" onclick="goBack()">
    לחזור אחורה 🏳️‍🌈
  </button>
</div>

<!-- מוזיקה -->
<audio id="music" autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- סאונד קליק -->
<audio id="clickSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
function playClick(){
  document.getElementById("clickSound").play();
}

function enterSite(){
  playClick();
  alert("נכנסת לאתר 🚀 (ניטרו פייק 😂)");
}

function goBack(){
  playClick();
  history.back();
}
</script>

</body>
</html>
