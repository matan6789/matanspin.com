<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>טקסט על סרטון</title>

<style>
body {
    margin: 0;
    overflow: hidden;
}

video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* הטקסט מעל הסרטון */
.text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    font-size: 80px;
    font-weight: bold;
    color: black;

    background: transparent;
    z-index: 2;
}
</style>

</head>

<body>

<video autoplay loop muted>
    <source src="video.mp4" type="video/mp4">
</video>

<div class="text">
    MATAN
</div>

</body>
</html>
