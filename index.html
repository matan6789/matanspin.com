<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERMAN COLOR DICE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
linear-gradient(
to bottom,
#000 0%,
#000 33%,
#dd0000 33%,
#dd0000 66%,
#ffce00 66%,
#ffce00 100%
);
}

.container{
width:95%;
max-width:900px;
background:rgba(20,20,20,.9);
backdrop-filter:blur(10px);
border-radius:25px;
padding:25px;
text-align:center;
color:white;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

h1{
font-size:40px;
margin-bottom:20px;
}

#dice{
width:220px;
height:220px;
margin:auto;
border-radius:25px;
background:white;
border:8px solid white;
transition:.2s;
}

.result{
margin-top:20px;
font-size:35px;
font-weight:bold;
}

.rollBtn{
margin-top:25px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:12px;
cursor:pointer;
background:#4caf50;
color:white;
}

.rollBtn:hover{
transform:scale(1.05);
}

.history{
margin-top:30px;
background:#111;
padding:15px;
border-radius:12px;
}

.history h2{
margin-bottom:10px;
}

#historyList{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.historyItem{
width:40px;
height:40px;
border-radius:8px;
}

.colors{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.colorBox{
width:50px;
height:50px;
border-radius:10px;
border:3px solid white;
}

</style>
</head>
<body>

<div class="container">

<h1>🇩🇪 GERMAN COLOR DICE</h1>

<div id="dice"></div>

<div class="result" id="result">
לחץ על ROLL
</div>

<button class="rollBtn" onclick="rollDice()">
🎲 ROLL
</button>

<div class="colors">

<div class="colorBox" style="background:red"></div>
<div class="colorBox" style="background:blue"></div>
<div class="colorBox" style="background:green"></div>
<div class="colorBox" style="background:yellow"></div>
<div class="colorBox" style="background:purple"></div>
<div class="colorBox" style="background:orange"></div>

</div>

<div class="history">

<h2>📊 היסטוריית תוצאות</h2>

<div id="historyList"></div>

</div>

</div>
<script>

const colors = [
{
name:"🔴 אדום",
color:"red"
},
{
name:"🔵 כחול",
color:"blue"
},
{
name:"🟢 ירוק",
color:"green"
},
{
name:"🟡 צהוב",
color:"yellow"
},
{
name:"🟣 סגול",
color:"purple"
},
{
name:"🟠 כתום",
color:"orange"
}
];

let rolling = false;

function rollDice(){

if(rolling) return;

rolling = true;

const dice =
document.getElementById("dice");

const result =
document.getElementById("result");

let count = 0;

const animation =
setInterval(()=>{

const randomColor =
colors[
Math.floor(
Math.random()*
colors.length
)
];

dice.style.background =
randomColor.color;

count++;

if(count > 30){

clearInterval(animation);

const winner =
colors[
Math.floor(
Math.random()*
colors.length
)
];

dice.style.background =
winner.color;

result.innerHTML =
"🏆 " + winner.name;

addHistory(
winner.color
);

rolling = false;

}

},100);

}

function addHistory(color){

const history =
document.getElementById(
"historyList"
);

const item =
document.createElement(
"div"
);

item.className =
"historyItem";

item.style.background =
color;

history.prepend(item);

while(
history.children.length > 20
){
history.removeChild(
history.lastChild
);
}

}
  function clearHistory(){

document.getElementById(
"historyList"
).innerHTML = "";

}

document.addEventListener(
"keydown",
(e)=>{

if(e.code === "Space"){

e.preventDefault();

rollDice();

}

}
);

window.onload = ()=>{

const dice =
document.getElementById(
"dice"
);

dice.style.background =
"white";

};

</script>

</body>
</html>
