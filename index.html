<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גלגל המזל של מתן</title>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Arial,sans-serif;
    color:white;
    background:
    radial-gradient(circle at top,#2a2a72,#000),
    linear-gradient(135deg,#000428,#004e92);
}

#logo{
    font-size:60px;
    margin-top:20px;
    color:gold;
    text-shadow:0 0 20px gold;
}

canvas{
    margin-top:20px;
}

button{
    padding:15px 25px;
    font-size:20px;
    margin:10px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

.spinBtn{
    background:gold;
    font-weight:bold;
}

.tiktokBtn{
    background:#ff0050;
    color:white;
}

#winner{
    font-size:32px;
    margin-top:20px;
    min-height:50px;
}
</style>
</head>
<body>

<h1 id="logo">🎡 גלגל המזל 🎡</h1>

<canvas id="wheel" width="400" height="400"></canvas>

<br>

<button class="spinBtn" onclick="spin()">
🎡 סובב
</button>

<button class="tiktokBtn"
onclick="window.open('https://www.tiktok.com/@matanos69?_r=1&_t=ZS-96qmLAYyYsi','_blank')">
📱 טיקטוק
</button>

<div id="winner"></div>

<script>
const prizes = [
"10 ₪",
"20 ₪",
"50 ₪",
"100 ₪",
"200 ₪",
"פרס גדול",
"סיבוב נוסף",
"לא זכית"
];

const colors = [
"#ff4d4d",
"#ff9900",
"#ffd700",
"#00cc66",
"#00ccff",
"#3366ff",
"#9933ff",
"#ff33cc"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;

function drawWheel(){

const size = prizes.length;
const arc = (2*Math.PI)/size;

for(let i=0;i<size;i++){

ctx.beginPath();
ctx.moveTo(200,200);

ctx.fillStyle = colors[i];

ctx.arc(
200,
200,
180,
i*arc,
(i+1)*arc
);

ctx.fill();

ctx.save();

ctx.translate(200,200);
ctx.rotate(i*arc+arc/2);

ctx.fillStyle="white";
ctx.font="16px Arial";

ctx.fillText(
prizes[i],
90,
5
);

ctx.restore();
}

ctx.beginPath();
ctx.fillStyle="white";

ctx.moveTo(200,10);
ctx.lineTo(185,40);
ctx.lineTo(215,40);

ctx.fill();
}

drawWheel();

function spin(){

const extra =
Math.floor(Math.random()*360)+1440;

angle += extra;

canvas.style.transition =
"transform 5s ease-out";

canvas.style.transform =
`rotate(${angle}deg)`;

setTimeout(()=>{

const final =
(angle%360);

const index =
prizes.length -
Math.floor(
(final/360)*prizes.length
)-1;

const winner =
prizes[
(index+prizes.length)
%prizes.length
];

document.getElementById("winner")
.innerHTML =
"🏆 זכית ב: " + winner;

confetti();

},5000);
}

function confetti(){

for(let i=0;i<50;i++){

let div =
document.createElement("div");

div.style.position="fixed";
div.style.left=
Math.random()*100+"vw";

div.style.top="-20px";

div.style.width="8px";
div.style.height="8px";

div.style.background=
`hsl(${Math.random()*360},100%,50%)`;

div.style.pointerEvents="none";

document.body.appendChild(div);

div.animate([
{transform:"translateY(0px)"},
{transform:"translateY(100vh)"}
],{
duration:3000,
iterations:1
});

setTimeout(()=>{
div.remove();
},3000);
}
}
</script>

</body>
</html>
