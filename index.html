<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גלגל המזל</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    text-align:center;
    color:white;
    min-height:100vh;
    background:
    radial-gradient(circle at top,#2a2a72,#000),
    linear-gradient(135deg,#000428,#004e92);
}

h1{
    font-size:60px;
    color:gold;
    text-shadow:0 0 20px gold;
    margin-top:20px;
}

#wheel{
    cursor:pointer;
    margin-top:20px;
}

textarea{
    width:300px;
    height:180px;
    font-size:18px;
    border-radius:10px;
    padding:10px;
}

input{
    font-size:18px;
    padding:8px;
    width:100px;
    text-align:center;
}

#winner{
    font-size:35px;
    margin-top:25px;
    font-weight:bold;
    color:gold;
}

.tiktokBtn{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    background:#ff0050;
    color:white;
}
</style>
</head>
<body>

<h1>🎡 גלגל המזל 🎡</h1>

<p>שם אחד בכל שורה:</p>

<textarea id="names">מתן
דניאל
נועה
יובל
איתי
</textarea>

<br><br>

<label>זמן סיבוב (שניות):</label>
<input type="number" id="spinTime" value="5" min="1" max="30">

<br><br>

<canvas id="wheel" width="500" height="500"></canvas>

<p>לחץ על הגלגל כדי לסובב 🎡</p>

<button class="tiktokBtn"
onclick="window.open('https://www.tiktok.com/@matanos69?_r=1&_t=ZS-96qmLAYyYsi','_blank')">
📱 טיקטוק
</button>

<div id="winner"></div>

<script>

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;
let spinning = false;

const colors = [
"#ff4d4d",
"#ff9900",
"#ffd700",
"#00cc66",
"#00ccff",
"#3366ff",
"#9933ff",
"#ff33cc",
"#00ffaa",
"#ff6666",
"#66ccff",
"#cc66ff"
];

function getNames(){
    return document
    .getElementById("names")
    .value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);
}

function drawWheel(){

const names = getNames();

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

const arc =
(2*Math.PI)/names.length;

for(let i=0;i<names.length;i++){

ctx.beginPath();
ctx.moveTo(250,250);

ctx.fillStyle =
colors[i % colors.length];

ctx.arc(
250,
250,
220,
i*arc,
(i+1)*arc
);

ctx.fill();

ctx.save();

ctx.translate(250,250);
ctx.rotate(i*arc + arc/2);

ctx.fillStyle="white";
ctx.font="bold 22px Arial";
ctx.textAlign="right";

ctx.fillText(
names[i],
190,
8
);

ctx.restore();
}

ctx.beginPath();
ctx.fillStyle="white";

ctx.moveTo(250,15);
ctx.lineTo(235,50);
ctx.lineTo(265,50);

ctx.fill();
}

function spin(){

if(spinning) return;

const names = getNames();

if(names.length < 2){
    alert("צריך לפחות 2 שמות");
    return;
}

spinning = true;

drawWheel();

const seconds =
Number(
document.getElementById("spinTime").value
);

const extra =
Math.floor(Math.random()*360)+1800;

angle += extra;

canvas.style.transition =
`transform ${seconds}s cubic-bezier(0.15,0.85,0.15,1)`;

canvas.style.transform =
`rotate(${angle}deg)`;

setTimeout(()=>{

const final =
((angle % 360)+360)%360;

const index =
(names.length -
Math.floor(
(final/360)*names.length
)-1 +
names.length)
% names.length;

document.getElementById("winner")
.innerHTML =
"🏆 הזוכה: " + names[index];

spinning = false;

},seconds*1000);
}

canvas.addEventListener("click",spin);

drawWheel();

document
.getElementById("names")
.addEventListener("input",drawWheel);

</script>

</body>
</html>
