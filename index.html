<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>אל תלחץ</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #222;
    font-family: Arial;
    direction: rtl;
}

.outer {
    background: black;
    padding: 50px;
    border-radius: 25px;
}

.inner {
    background: white;
    color: black;
    border: none;
    padding: 25px 50px;
    font-size: 30px;
    border-radius: 15px;
    cursor: pointer;
}

.inner:hover {
    transform: scale(1.1);
}

#clown {
    display: none;
    font-size: 200px;
    animation: pop 0.5s;
}

@keyframes pop {
    from {
        transform: scale(0);
    }
    to {
        transform: scale(1);
    }
}
</style>

</head>

<body>

<div class="outer" id="box">
    <button class="inner" onclick="clickButton(event)">
        אל תלחץ
    </button>
</div>

<div id="clown">
    🤡
</div>

<script>

let clicks = 0;

function clickButton(event) {

    event.stopPropagation();

    clicks++;

    if (clicks === 1) {
        alert("אתה בטוח שלחצת?");
    }

    if (clicks === 2) {
        document.getElementById("box").style.display = "none";
        document.getElementById("clown").style.display = "block";
    }

}

</script>

</body>
</html>
