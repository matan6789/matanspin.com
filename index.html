<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kido Color Dice</title>

<style>

body {
    margin:0;
    height:100vh;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.container {
    text-align:center;
}

h1 {
    color:white;
    font-size:42px;
    margin-bottom:25px;
}

select {
    padding:12px 30px;
    border-radius:15px;
    border:none;
    font-size:20px;
    margin-bottom:20px;
}


.board {
    width:260px;
    min-height:110px;
    background:#222;
    border-radius:20px;
    padding:15px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;

    margin:auto;
}


.dice {
    width:55px;
    height:55px;
    border-radius:12px;
    animation:glitch 0.5s;
}


@keyframes glitch {

0% {
    transform:scale(0) rotate(360deg);
    opacity:0;
}

50% {
    transform:scale(1.3) rotate(20deg);
}

100% {
    transform:scale(1) rotate(0deg);
    opacity:1;
}

}


button {

    margin-top:25px;
    width:220px;
    height:75px;

    border-radius:25px;
    border:none;

    font-size:35px;
    font-weight:bold;

    cursor:pointer;
    background:white;

}

</style>

</head>

<body>


<div class="container">

<h1>🤍 Kido Color Dice 🤍</h1>


<select id="amount">
<option value="1">1 Dice</option>
<option value="2">2 Dice</option>
<option value="3">3 Dice</option>
<option value="4">4 Dice</option>
<option value="5">5 Dice</option>
<option value="6">6 Dice</option>
</select>


<div class="board" id="diceBox"></div>


<button onclick="roll()">🎲 Roll</button>


</div>


<audio id="sound">
<source src="roll.mp3" type="audio/mpeg">
</audio>



<script>

const colors=[
"#ff0000",
"#0066ff",
"#00cc44",
"#ffff00",
"#ff8800",
"#9900ff"
];


function roll(){

let sound=document.getElementById("sound");

sound.currentTime=0;
sound.play();


let box=document.getElementById("diceBox");

let amount=document.getElementById("amount").value;


box.innerHTML="";


setTimeout(()=>{


for(let i=0;i<amount;i++){


let dice=document.createElement("div");

dice.className="dice";


dice.style.background =
colors[Math.floor(Math.random()*colors.length)];


box.appendChild(dice);


}

},500);


}

</script>


</body>
</html>
