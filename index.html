<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATAN SPIN</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
overflow-x:hidden;
text-align:center;
color:white;
background:
radial-gradient(circle at top,#2a2a72,#000),
linear-gradient(135deg,#000428,#004e92);
}

/* כוכבים */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:50px 50px,100px 100px;
animation:stars 20s linear infinite;
opacity:.5;
z-index:-1;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(100px);}
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#startScreen h1{
font-size:70px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 20px #00ffff;
margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.mainBtn{
background:linear-gradient(45deg,#00ffff,#ff00ff);
color:white;
}

#logo{
font-size:60px;
margin-top:20px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 30px #ff00ff;
}

input{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
font-size:16px;
}

#wheel{
width:320px;
height:320px;
border-radius:50%;
margin:auto;
border:6px solid gold;
box-shadow:
0 0 20px gold,
0 0 40px orange,
0 0 60px gold;
}

#arrow{
width:0;
height:0;
margin:15px auto -10px auto;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:30px solid gold;
filter:drop-shadow(0 0 10px gold);
}

#namesList{
margin:15px;
font-size:18px;
}

#winner{
font-size:28px;
margin-top:15px;
font-weight:bold;
color:gold;
text-shadow:0 0 10px gold;
}

#controls{
margin-top:15px;
}
</style>
</head>
<body>

<div id="startScreen">
<h1>MATAN</h1>
<button class="mainBtn" onclick="start('Me')">ME</button>
<button class="mainBtn" onclick="start('Chat')">CHAT</button>
</div>

<h1 id="logo">MATAN SPIN</h1>

<div>
<input id="nameInput" placeholder="הכנס שם">
<button class="mainBtn" onclick="addName()">הוסף</button>
</div>

<div id="controls">
<label>צבע רקע:</label>
<input type="color" id="bgColor" value="#000000">
<button class="mainBtn" onclick="changeBackground()">שנה</button>

<br><br>

<label>משך סיבוב:</label>
<input type="number" id="spinTime" value="3" min="1" max="30">
</div>

<div id="namesList"></div>

<div id="arrow"></div>

<canvas id="wheel" width="320" height="320"></canvas>

<br>

<button class="mainBtn" onclick="spin()">🎡 סובב גלגל</button>

<div id="winner"></div>

<script>

let names=[];
let spinning=false;
let audioCtx;
let currentRotation=0;

function start(mode){
document.getElementById("startScreen").style.display="none";
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function changeBackground(){
let color=document.getElementById("bgColor").value;
document.body.style.background=color;
}

function playCasinoSound(){

if(!audioCtx) return;

let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.type="sine";
osc.frequency.value=700;

gain.gain.value=0.1;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();

osc.frequency.exponentialRampToValueAtTime(
150,
audioCtx.currentTime+1.5
);

setTimeout(()=>osc.stop(),1500);
}

function addName(){

let input=document.getElementById("nameInput");

if(input.value.trim()==="") return;

names.push(input.value.trim());

input.value="";

drawWheel();

document.getElementById("namesList").innerHTML=
"משתתפים: "+names.join(", ");
}

function drawWheel(){

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

ctx.clearRect(0,0,320,320);

if(names.length===0) return;

let angle=2*Math.PI/names.length;

for(let i=0;i<names.length;i++){

ctx.beginPath();
ctx.moveTo(160,160);

ctx.fillStyle=
`hsl(${i*360/names.length},100%,50%)`;

ctx.arc(
160,
160,
160,
i*angle,
(i+1)*angle
);

ctx.fill();

ctx.save();

ctx.translate(160,160);

ctx.rotate(i*angle+angle/2);

ctx.fillStyle="white";
ctx.font="bold 16px Arial";
ctx.textAlign="right";

ctx.fillText(names[i],140,5);

ctx.restore();
}
}

function spin(){

if(spinning || names.length===0) return;

spinning=true;

playCasinoSound();

let seconds=
parseInt(document.getElementById("spinTime").value)||3;

let wheel=document.getElementById("wheel");

let extra=
Math.floor(Math.random()*360)+1800;

currentRotation+=extra;

wheel.style.transition=
`transform ${seconds}s linear`;

wheel.style.transform=
`rotate(${currentRotation}deg)`;

setTimeout(()=>{

spinning=false;

let normalized=
(currentRotation%360);

let sector=
360/names.length;

let winnerIndex=
Math.floor(
((360-normalized)%360)/sector
);

if(winnerIndex>=names.length)
winnerIndex=0;

let winner=names[winnerIndex];

document.getElementById("winner").innerHTML=
"🏆 הזוכה: "+winner;

alert("🎉 הזוכה הוא: "+winner);

},seconds*1000);
}

drawWheel();

</script>

</body>
</html>
