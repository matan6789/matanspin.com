<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLOR DICE ISRAEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle, white 1px, transparent 1px);
background-size:35px 35px;
animation:stars 15s linear infinite;
opacity:.7;
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(35px);
}
}

.container{
position:relative;
z-index:5;
width:95%;
max-width:1000px;
background:rgba(20,20,20,.9);
border-radius:20px;
padding:20px;
text-align:center;
color:white;
box-shadow:0 0 30px rgba(255,255,255,.15);
}

h1{
font-size:40px;
margin-bottom:20px;
}

.topBar{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:10px;
border-radius:8px;
border:none;
font-size:16px;
}

.rollBtn{
width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:35px;
cursor:pointer;
}

#diceContainer{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
min-height:180px;
margin-top:20px;
}

.diceBox{
width:90px;
height:90px;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:bold;
color:white;
}

.result{
font-size:30px;
margin-top:15px;
font-weight:bold;
}

.history{
margin-top:25px;
background:#111;
padding:15px;
border-radius:12px;
}

#historyList{
display:flex;
flex-direction:column;
gap:6px;
max-height:220px;
overflow-y:auto;
align-items:center;
}
  #colorPicker{
position:fixed;
right:10px;
bottom:10px;
background:rgba(0,0,0,.6);
padding:10px;
border-radius:10px;
font-size:12px;
color:white;
z-index:999;
opacity:.5;
}

#colorPicker:hover{
opacity:1;
}

#colorPicker label{
display:block;
margin:4px 0;
}

</style>
</head>
<body>

<div class="container">

<h1>🎲 COLOR DICE ISRAEL</h1>

<div class="topBar">

<select id="diceCount">
<option value="1">1 קובייה</option>
<option value="2">2 קוביות</option>
<option value="3">3 קוביות</option>
<option value="4">4 קוביות</option>
<option value="5">5 קוביות</option>
<option value="6">6 קוביות</option>
<option value="7">7 קוביות</option>
<option value="8">8 קוביות</option>
<option value="9">9 קוביות</option>
<option value="10">10 קוביות</option>
</select>

<button class="rollBtn" onclick="rollDice()">
🎲
</button>

</div>

<div id="diceContainer"></div>

<div class="result" id="result">
בחר מספר קוביות ולחץ 🎲
</div>

<div class="history">
<h2>📊 היסטוריה</h2>
<div id="historyList"></div>
</div>

</div>

<div id="colorPicker">

<b>צבעים פעילים</b>

<label><input type="checkbox" checked value="red"> 🔴 אדום</label>
<label><input type="checkbox" checked value="blue"> 🔵 כחול</label>
<label><input type="checkbox" checked value="green"> 🟢 ירוק</label>
<label><input type="checkbox" checked value="yellow"> 🟡 צהוב</label>
<label><input type="checkbox" checked value="purple"> 🟣 סגול</label>
<label><input type="checkbox" checked value="orange"> 🟠 כתום</label>

</div>

<script>

const colors = [
{name:"🔴 אדום",color:"red",emoji:"🔴"},
{name:"🔵 כחול",color:"blue",emoji:"🔵"},
{name:"🟢 ירוק",color:"green",emoji:"🟢"},
{name:"🟡 צהוב",color:"yellow",emoji:"🟡"},
{name:"🟣 סגול",color:"purple",emoji:"🟣"},
{name:"🟠 כתום",color:"orange",emoji:"🟠"}
];

let rolling = false;

  function rollDice(){

if(rolling) return;

rolling = true;

const enabledColors =
colors.filter(c=>{

const checkbox =
document.querySelector(
`input[value="${c.color}"]`
);

return checkbox.checked;

});

if(enabledColors.length === 0){

alert("בחר לפחות צבע אחד");

rolling = false;

return;
}

const count =
parseInt(
document.getElementById(
"diceCount"
).value
);

const container =
document.getElementById(
"diceContainer"
);

container.innerHTML = "";

let results = [];

for(let i=0;i<count;i++){

const winner =
enabledColors[
Math.floor(
Math.random() *
enabledColors.length
)
];

const box =
document.createElement(
"div"
);

box.className =
"diceBox";

box.style.background =
winner.color;

box.innerHTML =
winner.emoji;

container.appendChild(
box
);

results.push(
winner.name
);

addHistory(
winner.name
);

}

document
.getElementById("result")
.innerHTML =
results.join(" | ");

rolling = false;

}

function addHistory(colorName){

const history =
document.getElementById(
"historyList"
);

const item =
document.createElement(
"div"
);

item.innerHTML =
colorName;

history.appendChild(
item
);

}

document.addEventListener(
"keydown",
e=>{

if(e.code==="Space"){

e.preventDefault();

rollDice();

}

}
);

</script>

</body>
</html>
