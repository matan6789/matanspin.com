<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATAN SPIN</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1f2430;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

.sidebar{
width:320px;
background:#2b3140;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar h2{
text-align:center;
}

textarea{
width:100%;
height:250px;
background:#1c212c;
color:white;
border:none;
padding:10px;
border-radius:8px;
resize:none;
}

button{
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.primary{
background:#4f7cff;
color:white;
}

.secondary{
background:#444;
color:white;
}

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

#wheel{
background:white;
border-radius:50%;
box-shadow:0 0 25px rgba(0,0,0,.5);
}

.pointer{
position:absolute;
right:120px;
width:0;
height:0;
border-top:25px solid transparent;
border-bottom:25px solid transparent;
border-left:45px solid #4f7cff;
z-index:10;
}

.centerText{
position:absolute;
width:120px;
height:120px;
background:white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:20px;
cursor:pointer;
color:black;
}

#winnerBox{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.winnerContent{
background:white;
color:black;
padding:30px;
border-radius:12px;
text-align:center;
min-width:300px;
}

.winnerContent h1{
margin-bottom:10px;
}
</style>
</head>
<body>

<div class="sidebar">

<h2>MATAN SPIN</h2>

<textarea id="names">Matan
ChatGPT
Roblox
Discord</textarea>

<button class="primary" onclick="updateWheel()">
עדכן גלגל
</button>

<button class="secondary" onclick="shuffleNames()">
ערבב שמות
</button>

</div>

<div class="main">

<div class="pointer"></div>

<canvas id="wheel" width="700" height="700"></canvas>

<div class="centerText" onclick="spinWheel()">
SPIN
</div>

</div>

<div id="winnerBox">
<div class="winnerContent">
<h1 id="winnerText"></h1>
<button onclick="closeWinner()" class="primary">
סגור
</button>
</div>
</div>
<script>

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let names = [];
let rotation = 0;
let spinning = false;

const colors = [
"#ff6b6b",
"#4ecdc4",
"#45b7d1",
"#f7b731",
"#a55eea",
"#26de81",
"#fd9644",
"#fc5c65",
"#2bcbba",
"#3867d6"
];

function updateWheel(){

names = document
.getElementById("names")
.value
.split("\n")
.filter(x=>x.trim()!="");

drawWheel();
}

function drawWheel(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

if(names.length===0) return;

const cx = canvas.width/2;
const cy = canvas.height/2;
const radius = 330;

const angleSize =
(Math.PI*2)/names.length;

for(let i=0;i<names.length;i++){

const start =
i*angleSize + rotation;

const end =
start + angleSize;

ctx.beginPath();
ctx.moveTo(cx,cy);

ctx.arc(
cx,
cy,
radius,
start,
end
);

ctx.fillStyle =
colors[i%colors.length];

ctx.fill();

ctx.save();

ctx.translate(cx,cy);

ctx.rotate(
start + angleSize/2
);

ctx.fillStyle="white";
ctx.font="bold 22px Arial";
ctx.textAlign="right";

ctx.fillText(
names[i],
radius-25,
8
);

ctx.restore();
}

ctx.beginPath();
ctx.arc(
cx,
cy,
85,
0,
Math.PI*2
);

ctx.fillStyle="white";
ctx.fill();
}

function shuffleNames(){

for(
let i=names.length-1;
i>0;
i--
){

const j =
Math.floor(
Math.random()*(i+1)
);

[names[i],names[j]]
=
[names[j],names[i]];
}

document
.getElementById("names")
.value =
names.join("\n");

drawWheel();
}
  function spinWheel(){

if(spinning) return;

if(names.length < 2){
alert("הכנס לפחות 2 שמות");
return;
}

spinning = true;

const extraSpins =
(Math.PI * 2) *
(5 + Math.random()*5);

const startRotation = rotation;
const targetRotation =
rotation + extraSpins;

const duration = 6000;
const startTime = performance.now();

function animate(now){

const elapsed =
now - startTime;

const progress =
Math.min(
elapsed / duration,
1
);

const ease =
1 - Math.pow(
1-progress,
3
);

rotation =
startRotation +
(targetRotation-startRotation)
* ease;

drawWheel();

if(progress < 1){

requestAnimationFrame(
animate
);

}else{

spinning = false;

showWinner();
}
}

requestAnimationFrame(
animate
);
}

function showWinner(){

const anglePerSlice =
(Math.PI*2) /
names.length;

let normalized =
(rotation % (Math.PI*2));

let pointerAngle = 0;

let winningIndex =
Math.floor(
(
(Math.PI*2) -
normalized +
pointerAngle
)
/
anglePerSlice
) % names.length;

if(winningIndex < 0){
winningIndex += names.length;
}

document
.getElementById("winnerText")
.innerText =
"🏆 " +
names[winningIndex];

document
.getElementById("winnerBox")
.style.display =
"flex";
}

function closeWinner(){

document
.getElementById("winnerBox")
.style.display =
"none";
}

updateWheel();

</script>

</body>
</html>
