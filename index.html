<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COLOR DICE - מלאכי</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:radial-gradient(circle,#600000,#140000,#000);
min-height:100vh;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(white 1px,transparent 1px),
radial-gradient(red 1px,transparent 1px);
background-size:70px 70px,120px 120px;
animation:stars 25s linear infinite;
opacity:.35;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-250px);}
}

.container{
position:relative;
z-index:5;
width:95%;
max-width:900px;
text-align:center;
background:rgba(0,0,0,.35);
padding:30px;
border-radius:25px;
backdrop-filter:blur(10px);
}

.title1{
font-size:52px;
font-weight:900;
letter-spacing:2px;
text-shadow:0 0 20px white;
}

.title2{
font-size:34px;
margin-top:5px;
}

.title3{
font-size:78px;
font-weight:900;
color:#ff2020;
text-shadow:
0 0 10px red,
0 0 30px red,
0 0 60px red;
margin-bottom:30px;
}

.controls{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
}

select{
padding:12px 18px;
font-size:20px;
border-radius:10px;
border:none;
}

button{
padding:12px 35px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:12px;
background:#ff2d2d;
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.06);
}

#board{
display:grid;
grid-template-columns:repeat(3,120px);
justify-content:center;
gap:20px;
margin-top:20px;
}

.dice{
width:120px;
height:120px;
border-radius:18px;
background:#333;
box-shadow:0 0 20px rgba(255,255,255,.3);
transition:.15s;
}

.history{
margin-top:35px;
font-size:18px;
max-height:180px;
overflow:auto;
text-align:right;
}

.history div{
padding:8px;
margin-top:8px;
background:rgba(255,255,255,.08);
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="title1">🎲 COLOR DICE 🎲</div>

<div class="title2">המכור של</div>

<div class="title3">מלאכי</div>

<div class="controls">

<select id="amount">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6" selected>6</option>
</select>

<button onclick="roll()">🎲 גלגל</button>

</div>

<div id="board"></div>

<div class="history" id="history"></div>

</div>

<script>

const colors=[
"#ff2020",
"#2f7cff",
"#2ecc71",
"#ffd400",
"#9b59b6",
"#ff8c1a"
];

const board=document.getElementById("board");
const history=document.getElementById("history");
const amount=document.getElementById("amount");
  function randomColor(){
    return colors[Math.floor(Math.random()*colors.length)];
}

function roll(){

    board.innerHTML="";

    let total=Number(amount.value);
    let results=[];

    for(let i=0;i<total;i++){

        const box=document.createElement("div");
        box.className="dice";
        board.appendChild(box);

        let count=0;

        const anim=setInterval(()=>{

            box.style.background=randomColor();

            count++;

            if(count>18){

                clearInterval(anim);

                const final=randomColor();

                box.style.background=final;

                results.push(final);

                if(results.length===total){

                    const names={
                        "#ff2020":"🟥",
                        "#2f7cff":"🟦",
                        "#2ecc71":"🟩",
                        "#ffd400":"🟨",
                        "#9b59b6":"🟪",
                        "#ff8c1a":"🟧"
                    };

                    const row=document.createElement("div");

                    row.innerHTML=results.map(c=>names[c]).join(" ");

                    history.prepend(row);

                }

            }

        },80);

    }

}

roll();

</script>

</body>
</html>
