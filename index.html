<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matan Spin 🎰</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    text-align:center;
    color:white;
    min-height:100vh;
    background:linear-gradient(135deg,#000428,#004e92);
}

h1{
    font-size:60px;
    color:gold;
    text-shadow:0 0 20px gold;
    margin-top:20px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:50px;
    flex-wrap:wrap;
    margin-top:20px;
}

.controls{
    display:flex;
    flex-direction:column;
    gap:15px;
}

textarea{
    width:320px;
    height:180px;
    font-size:18px;
    border-radius:12px;
    padding:10px;
    resize:none;
}

input[type="number"]{
    font-size:18px;
    padding:8px;
    width:100px;
    text-align:center;
    border-radius:8px;
    border:none;
}

input[type="color"]{
    width:80px;
    height:40px;
    border:none;
    cursor:pointer;
}

#wheel{
    cursor:pointer;
    display:block;
    margin:auto;
}

#pointer{
    font-size:60px;
    line-height:1;
    margin-bottom:-20px;
    position:relative;
    z-index:10;
}

#winner{
    font-size:36px;
    margin-top:25px;
    font-weight:bold;
    color:gold;
    min-height:50px;
}

.tiktokBtn{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    background:#ff0050;
    color:white;
}

label{
    font-size:18px;
}
</style>
</head>
<body>

<h1>🎰 Matan Spin 🎰</h1>

<div class="container">

    <div class="controls">

        <p>הכנס שמות (שם אחד בכל שורה)</p>

        <textarea id="names">מתן
דניאל
נועה
יובל
איתי</textarea>

        <div>
            <label>זמן סיבוב (שניות): </label>
            <br><br>
            <input type="number" id="spinTime" value="5" min="1" max="30">
        </div>

        <div>
            <label>צבע רקע 1</label>
            <br>
            <input type="color" id="color1" value="#000428">
        </div>

        <div>
            <label>צבע רקע 2</label>
            <br>
            <input type="color" id="color2" value="#004e92">
        </div>

        <button class="tiktokBtn"
        onclick="window.open('https://www.tiktok.com/@matanos69?_r=1&_t=ZS-96qmLAYyYsi','_blank')">
        📱 טיקטוק
        </button>

    </div>

    <div>

        <div id="pointer">🔻</div>

        <canvas id="wheel" width="400" height="400"></canvas>

        <p>לחץ על הגלגל כדי לסובב</p>

    </div>

</div>

<div id="winner"></div>

<script>

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;
let spinning = false;

const colors = [
"#ff4d4d",
"#ff9900",
"#ffd700",
"#00cc66",
"#00ccff",
"#3366ff",
"#9933ff",
"#ff33cc",
"#00ffaa",
"#ff6666",
"#66ccff",
"#cc66ff"
];

function getNames(){

    return document
    .getElementById("names")
    .value
    .split("\n")
    .map(name => name.trim())
    .filter(name => name !== "");

}

function drawWheel(){

    const names = getNames();

    ctx.clearRect(0,0,400,400);

    if(names.length === 0) return;

    const arc = (Math.PI * 2) / names.length;

    for(let i=0;i<names.length;i++){

        ctx.beginPath();
        ctx.moveTo(200,200);

        ctx.fillStyle =
        colors[i % colors.length];

        ctx.arc(
            200,
            200,
            170,
            i * arc,
            (i + 1) * arc
        );

        ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(200,200,30,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

}

function spin(){

    if(spinning) return;

    const names = getNames();

    if(names.length < 2){

        alert("צריך לפחות שני שמות");
        return;

    }

    spinning = true;

    const seconds =
    Number(document.getElementById("spinTime").value);

    const extraRotation =
    Math.floor(Math.random()*360)+1800;

    angle += extraRotation;

    canvas.style.transition =
    `transform ${seconds}s cubic-bezier(0.15,0.85,0.15,1)`;

    canvas.style.transform =
    `rotate(${angle}deg)`;

    setTimeout(()=>{

        const arc = 360 / names.length;

        const normalized =
        ((angle % 360) + 360) % 360;

        const pointerAngle =
        (360 - normalized + 90) % 360;

        const winnerIndex =
        Math.floor(pointerAngle / arc);

        const winner =
        names[winnerIndex];

        document.getElementById("winner").innerHTML =
        "🏆 הזוכה: " + winner;

        spinning = false;

    }, seconds * 1000);

}

function updateBackground(){

    const c1 =
    document.getElementById("color1").value;

    const c2 =
    document.getElementById("color2").value;

    document.body.style.background =
    `linear-gradient(135deg, ${c1}, ${c2})`;

}

canvas.addEventListener("click", spin);

document
.getElementById("names")
.addEventListener("input", drawWheel);

document
.getElementById("color1")
.addEventListener("input", updateBackground);

document
.getElementById("color2")
.addEventListener("input", updateBackground);

drawWheel();
updateBackground();

</script>

</body>
</html>
